name: CI/CD Calculadora

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Se você tivesse um requirements.txt, instalaria aqui
        
    - name: CI - Lint com Flake8 (Qualidade de Código)
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: CD - Simulação de Deploy
      run: |
        echo "O código passou nos testes!"
        echo "Realizando Deploy no ambiente de produção..."
